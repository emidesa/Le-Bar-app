version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: barapp-db
    environment:
      POSTGRES_DB: barapp
      POSTGRES_USER: barapp
      POSTGRES_PASSWORD: barapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: barapp-backend
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/barapp
      SPRING_DATASOURCE_USERNAME: barapp
      SPRING_DATASOURCE_PASSWORD: barapp
      APP_JWT_SECRET: barapp-secret-key-pour-lexamen-cda-2026-suffisamment-longue
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: barapp-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: