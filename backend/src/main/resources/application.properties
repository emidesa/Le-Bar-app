spring.application.name=backend

# Base de données
spring.datasource.url=jdbc:postgresql://localhost:5432/barapp
spring.datasource.username=barapp
spring.datasource.password=barapp
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
server.port=8081

# Clé secrète JWT fixe (ne pas changer, sinon tous les tokens existants seront invalides)
app.jwt.secret=barapp-secret-key-pour-lexamen-cda-2026-suffisamment-longue

# Upload de photos (10MB max)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB